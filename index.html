<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evelyn's Lovely Jar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Main App Screen (Evelyn's View) -->
        <div id="mainScreen" class="screen active">
            <!-- Navigation Bar -->
            <nav class="navbar">
                <button class="nav-btn active" onclick="switchTab('jar')">
                    <span class="nav-emoji">🫙</span>
                    <span class="nav-text">Jar</span>
                </button>
                <button class="nav-btn" onclick="switchTab('gallery')">
                    <span class="nav-emoji">🖼️</span>
                    <span class="nav-text">Gallery</span>
                </button>
            </nav>

            <!-- Jar Tab -->
            <div id="jarTab" class="tab-content active">
                <div class="jar-container">
                    <!-- Mason Jar -->
                    <div class="mason-jar">
                        <!-- Jar Lid -->
                        <div class="jar-lid">
                            <div class="lid-top"></div>
                            <div class="lid-text">Evelyn's<br>Lovely Jar</div>
                            <div class="lid-ring"></div>
                        </div>

                        <!-- Jar Body -->
                        <div class="jar-body">
                            <div id="notesContainer" class="notes-container">
                                <!-- Notes will be added here dynamically -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Current Date Display -->
                <div class="date-display" id="dateDisplay"></div>

                <!-- Countdown Display -->
                <div class="countdown-display" id="countdownDisplay"></div>

                <!-- Today's Note Info -->
                <div class="note-info">
                    <p id="noteStatus">No note for today yet</p>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button onclick="openTodayNote()" class="btn btn-secondary" id="viewTodayBtn" style="display: none;">📖 View Today's Note</button>
                </div>
            </div>

            <!-- Gallery Tab -->
            <div id="galleryTab" class="tab-content">
                <h2>📚 Note Gallery</h2>
                <div class="gallery-grid" id="galleryGrid">
                    <!-- Past notes will be displayed here -->
                </div>
            </div>
        </div>

        <!-- Note Viewer Modal -->
        <div id="noteViewerModal" class="modal">
            <div class="modal-content note-viewer">
                <div class="modal-header">
                    <h2 id="viewerTitle"></h2>
                    <button onclick="closeNoteViewer()" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <p id="viewerDate" class="viewer-date"></p>
                    <div id="viewerContent" class="viewer-content"></div>
                </div>
                <div class="modal-footer">
                    <button onclick="closeNoteViewer()" class="btn btn-primary">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="notes-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
